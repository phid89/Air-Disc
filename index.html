<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Air Disc</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #0f0; font-family: "Courier New", monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; }
h1 { margin: 10px 0; font-size: 28px; text-shadow: 0 0 10px #0f0; }
#controls { display: flex; gap: 20px; margin: 8px 0; flex-wrap: wrap; justify-content: center; }
#controls label { font-size: 13px; }
#controls input[type=range] { width: 120px; accent-color: #0f0; }
button { background: #0f0; color: #111; border: none; padding: 6px 20px; font-family: inherit; font-weight: bold; cursor: pointer; font-size: 14px; }
button:hover { background: #0a0; }
canvas { border: 2px solid #0f0; margin-top: 8px; box-shadow: 0 0 20px #0f044; }
#score { font-size: 22px; margin: 8px 0; text-shadow: 0 0 8px #0f0; }
</style>
</head>
<body>
<h1>AIR DISC</h1>
<div id="score">0 : 0</div>
<div id="controls">
  <label>Bar-Breite: <span id="bwVal">80</span><br><input type="range" id="barWidth" min="30" max="200" value="80"></label>
  <label>Ball-Speed: <span id="bsVal">4</span><br><input type="range" id="ballSpeed" min="2" max="12" value="4"></label>
  <label>KI-Schwierigkeit: <span id="diffVal">3</span><br><input type="range" id="difficulty" min="1" max="7" value="3"></label>
  <button id="startBtn">START</button>
</div>
<canvas id="c" width="600" height="400"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let barW = 80, speed = 4, diff = 3;
let playerScore = 0, aiScore = 0;
let running = false;
let ball, player, ai;

const sliderBW = document.getElementById('barWidth');
const sliderBS = document.getElementById('ballSpeed');
const sliderDiff = document.getElementById('difficulty');

sliderBW.oninput = () => { barW = +sliderBW.value; document.getElementById('bwVal').textContent = barW; };
sliderBS.oninput = () => { speed = +sliderBS.value; document.getElementById('bsVal').textContent = speed; };
sliderDiff.oninput = () => { diff = +sliderDiff.value; document.getElementById('diffVal').textContent = diff; };

function reset() {
  ball = { x: W / 2, y: H / 2, dx: speed * (Math.random() > 0.5 ? 1 : -1), dy: speed * (Math.random() - 0.5) * 1.2 };
  player = { x: 10, y: H / 2 - barW / 2 };
  ai = { x: W - 20, y: H / 2 - barW / 2 };
}

function updateScore() {
  document.getElementById('score').textContent = playerScore + ' : ' + aiScore;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  player.y = e.clientY - rect.top - barW / 2;
  player.y = Math.max(0, Math.min(H - barW, player.y));
});

function loop() {
  if (!running) return;

  // AI
  const aiCenter = ai.y + barW / 2;
  const aiSpeed = diff * 0.8;
  if (ball.y > aiCenter + 5) ai.y += aiSpeed;
  else if (ball.y < aiCenter - 5) ai.y -= aiSpeed;
  ai.y = Math.max(0, Math.min(H - barW, ai.y));

  // Ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Top/bottom bounce
  if (ball.y <= 5 || ball.y >= H - 5) ball.dy *= -1;

  // Player paddle
  if (ball.x <= 20 && ball.y >= player.y && ball.y <= player.y + barW) {
    ball.dx = Math.abs(ball.dx);
    ball.dy += (ball.y - (player.y + barW / 2)) * 0.1;
  }
  // AI paddle
  if (ball.x >= W - 25 && ball.y >= ai.y && ball.y <= ai.y + barW) {
    ball.dx = -Math.abs(ball.dx);
    ball.dy += (ball.y - (ai.y + barW / 2)) * 0.1;
  }

  // Score
  if (ball.x < 0) { aiScore++; updateScore(); reset(); }
  if (ball.x > W) { playerScore++; updateScore(); reset(); }

  // Draw
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Center line
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = '#0f044';
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle = '#0f0';
  ctx.fillRect(player.x, player.y, 10, barW);
  ctx.fillRect(ai.x, ai.y, 10, barW);

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(loop);
}

document.getElementById('startBtn').onclick = () => {
  playerScore = 0; aiScore = 0; updateScore();
  reset();
  running = true;
  loop();
};

// Initial draw
reset();
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#0f0';
ctx.fillRect(player.x, player.y, 10, barW);
ctx.fillRect(ai.x, ai.y, 10, barW);
ctx.beginPath();
ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
ctx.fill();
</script>
</body>
</html>
